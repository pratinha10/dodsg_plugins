// DODSG Pause - Configuration file
// Location: addons/sourcemod/configs/dodsg_pause.cfg

// Maximum pause duration in seconds. Set to 0 for unlimited.
// Default: 300 (5 minutes)
dodsg_pause_maxtime "60"

// Interval in seconds between remaining-time announcements in chat.
// Minimum: 10  Default: 60
dodsg_pause_warntime "30"